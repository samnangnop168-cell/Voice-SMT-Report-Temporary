<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>SMT TRACKER PRO</title>
    <script src="https://unpkg.com/html5-qrcode"></script>
    <link href="https://fonts.googleapis.com/css2?family=Orbitron:wght@400;700&family=Inter:wght@300;500;700&display=swap" rel="stylesheet">
    <style>
        :root {
            --neon-blue: #00d2ff;
            --neon-green: #39ff14;
            --dark-bg: #0f172a;
            --glass: rgba(30, 41, 59, 0.85);
            --card-border: rgba(255, 255, 255, 0.1);
        }

        body {
            margin: 0; padding: 10px;
            background: #0f172a;
            color: #f1f5f9;
            font-family: 'Inter', sans-serif;
            display: flex; flex-direction: column; align-items: center;
            min-height: 100vh;
            overflow-x: hidden;
        }

        .header {
            width: 100%; max-width: 480px;
            display: flex; justify-content: space-between; align-items: center;
            margin-bottom: 15px;
        }

        h1 { font-family: 'Orbitron', sans-serif; font-size: 1.1rem; color: var(--neon-blue); margin: 0; letter-spacing: 1px; }

        .glass-card {
            background: var(--glass);
            backdrop-filter: blur(10px);
            border: 1px solid var(--card-border);
            border-radius: 20px;
            padding: 15px;
            width: 100%; max-width: 480px;
            box-sizing: border-box;
            box-shadow: 0 10px 30px rgba(0,0,0,0.5);
        }

        #reader {
            width: 100% !important; border-radius: 12px; overflow: hidden;
            border: 1px solid var(--card-border);
            margin-bottom: 15px; background: #000;
        }

        .grid { display: grid; grid-template-columns: 1fr 1fr; gap: 10px; }
        .span-2 { grid-column: span 2; }

        .input-group { display: flex; flex-direction: column; gap: 4px; }
        label { font-size: 0.65rem; font-weight: 700; color: #94a3b8; text-transform: uppercase; letter-spacing: 0.5px; }

        input, select {
            background: rgba(255, 255, 255, 0.07);
            border: 1px solid var(--card-border);
            border-radius: 10px;
            padding: 12px; color: white;
            font-size: 0.9rem; width: 100%; box-sizing: border-box;
            outline: none;
        }
        
        input:focus { border-color: var(--neon-blue); background: rgba(255, 255, 255, 0.12); }
        input[readonly] { color: #94a3b8; background: rgba(0,0,0,0.2); border-color: transparent; }

        .scan-trigger {
            background: #334155; border: none; border-radius: 10px;
            padding: 0 15px; cursor: pointer; color: white; transition: 0.2s;
        }
        .scan-trigger:active { background: var(--neon-blue); }

        .submit-btn {
            background: linear-gradient(135deg, #2563eb, #00d2ff);
            color: white; border: none; border-radius: 12px;
            padding: 16px; width: 100%; font-weight: bold;
            font-size: 1rem; margin-top: 20px; cursor: pointer;
            text-transform: uppercase; letter-spacing: 1px;
        }

        .history-container {
            width: 100%; max-width: 480px; margin-top: 20px;
            overflow-x: auto;
            background: var(--glass);
            border-radius: 15px; border: 1px solid var(--card-border);
        }

        .history-table {
            width: 100%; border-collapse: collapse; font-size: 0.65rem; min-width: 550px;
        }
        .history-table th { padding: 12px 10px; text-align: left; color: #94a3b8; background: rgba(255,255,255,0.05); }
        .history-table td { padding: 10px; text-align: left; color: #e2e8f0; border-top: 1px solid var(--card-border); }

        .status-bar { font-size: 0.8rem; text-align: center; margin-bottom: 12px; font-weight: 500; }
        .dot { height: 8px; width: 8px; background-color: var(--neon-green); border-radius: 50%; display: inline-block; margin-right: 6px; box-shadow: 0 0 8px var(--neon-green); }

        .hidden { display: none !important; }
    </style>
</head>
<body>

    <div id="main-screen" style="width:100%;">
        <div class="header" style="margin: 0 auto 15px auto;">
            <h1>SMT TRACKER PRO</h1>
            <div id="status" class="status-bar" style="margin-bottom:0;"><span class="dot"></span>System Active</div>
        </div>

        <div class="glass-card" style="margin: 0 auto;">
            <div id="reader"></div>

            <div class="grid">
                <div class="input-group span-2">
                    <label>Box No.</label>
                    <div style="display:flex; gap:8px;">
                        <input type="text" id="box-no" placeholder="Scan PCBA-...">
                        <button class="scan-trigger" onclick="resumeScanner('box-no')">📷</button>
                    </div>
                </div>

                <div class="input-group span-2">
                    <label>Process (Scan or Type OQC)</label>
                    <div style="display:flex; gap:8px;">
                        <input type="text" id="process-input" placeholder="OQC-..." style="background: rgba(255, 255, 255, 0.1);">
                        <button class="scan-trigger" onclick="resumeScanner('process-input')">📷</button>
                    </div>
                </div>

                <div class="input-group">
                    <label>Action</label>
                    <select id="action-type">
                        <option value="Register">Register</option>
                        <option value="Confirm">Confirm</option>
                    </select>
                </div>

                <div class="input-group">
                    <label>Type</label>
                    <select id="io-type">
                        <option value="IN">IN</option>
                        <option value="OUT">OUT</option>
                    </select>
                </div>

                <div class="input-group span-2">
                    <label>Model Name</label>
                    <input type="text" id="model-name" readonly placeholder="Waiting for model scan...">
                </div>

                <div class="input-group">
                    <label>Side</label>
                    <input type="text" id="side-id" readonly>
                </div>

                <div class="input-group">
                    <label>Location</label>
                    <input type="text" id="location-id" readonly>
                </div>

                <div class="input-group span-2">
                    <label style="color:var(--neon-blue)">Quantity</label>
                    <input type="number" id="qty-input" placeholder="0" style="font-size: 1.2rem; font-weight: bold; border-color: var(--neon-blue);">
                </div>
            </div>

            <button class="submit-btn" id="submit-btn" onclick="submitData()">TRANSMIT DATA</button>
        </div>

        <div class="history-container" style="margin: 20px auto;">
            <table class="history-table">
                <thead>
                    <tr><th>Box</th><th>Process</th><th>Action</th><th>I/O</th><th>Model</th><th>Qty</th></tr>
                </thead>
                <tbody id="history-body"></tbody>
            </table>
        </div>
    </div>

    <script>
        const SCRIPT_URL = "YOUR_WEB_APP_URL_HERE"; 

        let localHistory = JSON.parse(localStorage.getItem('smt_hist_v6')) || [];
        let lastTarget = null;
        
        const mainScanner = new Html5QrcodeScanner("reader", { 
            fps: 20, 
            qrbox: { width: 250, height: 250 },
            aspectRatio: 1.0
        });

        window.onload = function() {
            updateTableUI();
            mainScanner.render(onMainScanSuccess);
        };

        function onMainScanSuccess(text) {
            mainScanner.pause(true); 
            const p = text.split(',');
            
            // 1. AUTO-DETECT PROCESS (OQC)
            if (text.toUpperCase().includes("OQC")) {
                document.getElementById('process-input').value = text.trim();
                msg("✔ PROCESS DETECTED", "#39ff14");
                mainScanner.resume();
            } 
            // 2. AUTO-DETECT BOX NO (PCBA-)
            else if (text.toUpperCase().includes("PCBA-")) {
                document.getElementById('box-no').value = text.trim();
                msg("✔ BOX DETECTED", "#39ff14");
                mainScanner.resume();
            } 
            // 3. MODEL DATA (COMMA SEPARATED)
            else if (p.length >= 3) {
                document.getElementById('model-name').value = p[0].trim();
                document.getElementById('side-id').value = p[1].trim();
                document.getElementById('location-id').value = p[2].trim();
                document.getElementById('qty-input').focus();
                msg("✔ MODEL SYNCED", "#00d2ff");
            } 
            // 4. MANUAL TARGETED SCAN
            else if (lastTarget) {
                document.getElementById(lastTarget).value = text.trim();
                msg("✔ FIELD UPDATED", "#00d2ff");
            } 
            else {
                msg("⚠ UNKNOWN FORMAT", "orange");
                mainScanner.resume();
            }
        }

        function resumeScanner(targetId) {
            lastTarget = targetId;
            msg("SCANNER READY...", "#00d2ff");
            mainScanner.resume();
        }

        function submitData() {
            const box = document.getElementById('box-no').value;
            const process = document.getElementById('process-input').value;
            const action = document.getElementById('action-type').value;
            const type = document.getElementById('io-type').value;
            const model = document.getElementById('model-name').value;
            const side = document.getElementById('side-id').value;
            const loc = document.getElementById('location-id').value;
            const qty = document.getElementById('qty-input').value;

            if (!model || !qty) return alert("Please ensure Model and Qty are filled!");

            msg("TRANSMITTING...", "#00d2ff");
            document.getElementById('submit-btn').disabled = true;

            // Save to local history
            localHistory.unshift({ box, process, action, type, model, qty });
            localStorage.setItem('smt_hist_v6', JSON.stringify(localHistory.slice(0, 10)));
            updateTableUI();

            fetch(SCRIPT_URL, {
                method: "POST", mode: "no-cors",
                body: JSON.stringify({ box, process, action, type, model, side, loc, qty })
            })
            .then(() => {
                msg("✔ DATA SAVED", "#39ff14");
                resetForm(); // Process remains
                mainScanner.resume(); 
            })
            .catch(() => msg("❌ UPLOAD ERROR", "#ef4444"))
            .finally(() => document.getElementById('submit-btn').disabled = false);
        }

        function resetForm() {
            // Clears everything EXCEPT Process
            ['model-name','side-id','location-id','box-no','qty-input'].forEach(id => {
                document.getElementById(id).value = "";
            });
            lastTarget = null;
        }

        function updateTableUI() {
            const body = document.getElementById('history-body');
            body.innerHTML = localHistory.slice(0, 10).map(h => `
                <tr>
                    <td style="color:#94a3b8">${h.box || '-'}</td>
                    <td>${h.process || '-'}</td>
                    <td>${h.action}</td>
                    <td>${h.type}</td>
                    <td>${h.model}</td>
                    <td style="color:var(--neon-blue); font-weight:bold;">${h.qty}</td>
                </tr>
            `).join('');
        }

        function msg(t, c) {
            const s = document.getElementById('status');
            s.innerHTML = `<span class="dot" style="background:${c}; box-shadow: 0 0 8px ${c}"></span>${t}`;
            s.style.color = c;
        }
    </script>
</body>
</html>
